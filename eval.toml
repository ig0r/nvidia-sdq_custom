Title = "Pub242 vs Techbriefs Retrieval Eval"

[corpus]
# Both answer corpora are embedded into one Qdrant collection, distinguished by
# the `source` payload field. Modes are Qdrant Filters at query time.
pub242_json     = "./examples/db-for-mason-pub/pub242_hq.json"
techbriefs_json = "./data/nemo_briefs_20260429/qa-gen-cluster/generated-questions_wo_context-c-eval.json"

[queries]
# Pub242 hq questions are the queries.
input = "./examples/db-for-mason-pub/pub242_hq.json"

# How many of the loaded questions to ask. Set to 0 (or omit) to ask all.
# CLI -n overrides this when present.
num_questions = 100

# How to pick `num_questions` from the loaded list:
#   "sequential" — first N entries, in file order (deterministic, fast)
#   "random"     — random sample of size N using `seed`
# CLI --selection overrides this when present.
selection = "random"

# RNG seed for selection = "random". Pinning makes the selection reproducible
# across runs, which keeps mode-to-mode and rerun comparisons fair.
seed = 42

[embedding]
model      = "BAAI/bge-base-en-v1.5"
dim        = 768
batch_size = 64

[qdrant]
db_path    = "./data/nemo_briefs_20260429/eval/qdrant_db"
collection = "answers_combined"

[eval]
top_k       = 5
match_at_k  = [1, 3, 5]
output_dir  = "./data/nemo_briefs_20260429/eval"
modes       = ["pub242_only", "techbriefs_only", "both"]
