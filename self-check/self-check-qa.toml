Title = "Self-check QA evaluation"

[self-check-qa]
# Input: single JSON list produced by generate-qa.py
# Each record has: question_id, question, answer, context_text, ...
input_qa_json = "./data/nemo_briefs_20260429/qa-gen-cluster/generated-questions.json"

# Prompt template (same one used by the example pipeline)
prompt_eval = "./self-check/prompts/evaluate-process-question-answer-02.txt"

# Ollama model
# cluster: gpt-oss:120b ; local debug: gpt-oss:20b
model = "gpt-oss:120b"

# Outputs (created if missing)
output_json            = "./self-check/self-check-output/self-check-qa-results.json"
output_json_wo_context = "./self-check/self-check-output/self-check-qa-results_wo_context.json"
output_csv             = "./self-check/self-check-output/self-check-qa-results.csv"
intermediate_json      = "./self-check/self-check-output/self-check-qa-intermediate.json"

# Behavior
retries_number = 3
periodic_save_interval = 200
max_concurrent_questions = 50

# When true, persist the raw Ollama response under
# question_evaluation.evaluation_answering.full_response
debug = false
