# eval2.toml — base vs fine-tuned embedding eval on the techbriefs corpus.
#
# Paths are resolved relative to the current working directory.
# Run the script from the project root:
#   cd /Users/igor/dev/llm/pavement-gpt/nvidia-pipeline/nvidia-sdq_custom
#   python examples/eval2/eval2.py --config examples/eval2/eval2.toml --setup-rag

[general]
input      = "./data/nemo_briefs_20260429/qa-gen-cluster/generated-questions_wo_context-c-eval.json"
db_path    = "./data/nemo_briefs_20260429/eval2/qdrant_db"
output_dir = "./data/nemo_briefs_20260429/eval2"
name       = "techbriefs"

[rag]
collection_name   = "techbriefs_answers"
embedding_backend = "sentence-transformers"
embedding_model   = "BAAI/bge-base-en-v1.5"
embedding_dim     = 768
encode_batch_size = 64
top_k             = 5
match_at_k        = [1, 3, 5]
# Derived outputs:
#   {output_dir}/techbriefs_rag_results.json
#   {output_dir}/techbriefs_rag_results.csv

[rag-ft]
collection_name   = "techbriefs_answers_ft"
embedding_model   = "./examples/eval2/bge-base-pavements-matryoshka"
embedding_dim     = 768
encode_batch_size = 64
top_k             = 5
match_at_k        = [1, 3, 5]
# Derived outputs:
#   {output_dir}/techbriefs_rag_ft_results.json
#   {output_dir}/techbriefs_rag_ft_results.csv
