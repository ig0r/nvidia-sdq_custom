Title = "Generate QA"

[generate-qa]
generate_qa = true
extract_citations = true

# Input: directory of *-logic-ctx.json + *-logic-artifacts.json
# (output of _nemo.py random_logical chunking + langextract artifact stage)
chunk_dir = "./data/_test/chunk_test-random-logic2/doc-chunks_256_random_logical"

# Output
output_dir = "./data/_test/qa-gen"
output_file = "generated-questions.json"
output_qa_file = "generated-questions_qa_only.json"
output_csv_file = "generated-questions.csv"

# Prompts
question_generate_prompt = "./prompts/nemo_qa-gen-artifact.txt"
extract_citation_prompt  = "./prompts/nemo_extract-citation.txt"

# Models (gpt-* | gemini-* | any other = ollama model)
model_qa = "gpt-4o-mini"
model_citations = "gpt-4o-mini"

# Concurrency / periodic save
max_concurrent_qa = 20
max_concurrent_citations = 20
periodic_save_interval_qa = 25
periodic_save_interval_citations = 100

# Artifact selection
artifact_categories = [
  "finding",
  "issue",
  "method",
  "procedure",
  "recommendation",
  "best_practice",
  "rationale",
]
include_summary_element = true   # one synthetic element per ctx from chunk_signals.summary
max_artifacts_per_ctx = 0        # 0 = no cap

# Symbol replacement (optional; for models with issues on certain characters)
replace_symbols = false
[[generate-qa.symbols]]
values       = ["±", "\\pm", "≥", "≤", "µm", "~{\\mu\\mathrm{m}}", "\\mu\\mathrm{m}", "\\mathrm{mm}", "½"]
replace_with = ["+/-", "+/-", ">=", "<=", "um", " um", "um", "mm", "1/2"]
